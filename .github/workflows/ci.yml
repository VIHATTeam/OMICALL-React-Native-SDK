name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # TypeScript check + JS build
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: TypeScript check
        run: yarn typecheck

      - name: Build JS (commonjs + module)
        run: yarn prepack

  # ─────────────────────────────────────────────
  # Android build (Old Architecture)
  # ─────────────────────────────────────────────
  android-old-arch:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install example dependencies
        working-directory: example
        run: yarn install --no-frozen-lockfile

      - name: Set OMI Maven credentials
        run: |
          mkdir -p ~/.gradle
          echo "OMI_USER=${{ secrets.OMI_USER }}" >> ~/.gradle/gradle.properties
          echo "OMI_TOKEN=${{ secrets.OMI_TOKEN }}" >> ~/.gradle/gradle.properties

      - name: Build Android (Old Arch)
        working-directory: example/android
        run: |
          sed -i 's/newArchEnabled=true/newArchEnabled=false/' gradle.properties
          ./gradlew :omikit-plugin:compileDebugKotlin --no-daemon

  # ─────────────────────────────────────────────
  # Android build (New Architecture)
  # ─────────────────────────────────────────────
  android-new-arch:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install example dependencies
        working-directory: example
        run: yarn install --no-frozen-lockfile

      - name: Set OMI Maven credentials
        run: |
          mkdir -p ~/.gradle
          echo "OMI_USER=${{ secrets.OMI_USER }}" >> ~/.gradle/gradle.properties
          echo "OMI_TOKEN=${{ secrets.OMI_TOKEN }}" >> ~/.gradle/gradle.properties

      - name: Build Android (New Arch)
        working-directory: example/android
        run: |
          sed -i 's/newArchEnabled=false/newArchEnabled=true/' gradle.properties
          ./gradlew :omikit-plugin:compileDebugKotlin --no-daemon
